include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - lib/**/*.g.dart
    - lib/**/*.freezed.dart
    - test/generated_migrations/**
    - drift_schemas/**
    - build/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  # NOTE: custom_lint / riverpod_lint plugin registration is deferred.
  # Wave 1 (plan 01-01) could not install riverpod_generator + custom_lint
  # + riverpod_lint because drift_dev 2.32.1 locks analyzer ^10 while every
  # published riverpod_generator requires analyzer ^9 or older. When the
  # ecosystem catches up, re-add:
  #   plugins:
  #     - custom_lint
  errors:
    # Internal app — not publishing a public API.
    public_member_api_docs: ignore
    # Drift companion constructors use positional booleans by design.
    avoid_positional_boolean_parameters: warning

linter:
  rules:
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    avoid_dynamic_calls: true
