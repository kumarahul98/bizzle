<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="description" content="See how much of your day belongs to traffic — and take some of it back. Traevy tracks your commute passively and provides actionable insights."/>
<meta name="theme-color" content="#FAFAFA" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#252422" media="(prefers-color-scheme: dark)"/>
<meta property="og:title" content="Traevy — See what traffic costs you" />
<meta property="og:description" content="See how much of your day belongs to traffic — and take some of it back. Traevy tracks your commute passively." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://traevy.com" />
<meta property="og:image" content="https://traevy.com/og-image.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Traevy — See what traffic costs you" />
<meta name="twitter:description" content="See how much of your day belongs to traffic — and take some of it back. Traevy tracks your commute passively." />
<meta name="twitter:image" content="https://traevy.com/og-image.png" />
<link rel="canonical" href="https://traevy.com/" />
<link rel="icon" type="image/png" href="/favicon.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<title>Traevy — See what traffic costs you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; scroll-padding-top: 88px; -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; background: oklch(0.985 0.003 80); color: oklch(0.22 0.01 250);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  a { -webkit-tap-highlight-color: transparent; }
  button { font-family: inherit; }

  /* phone bezel — content-box so the 360x740 screen fits exactly inside the border */
  .traevy-frame {
    border-radius: 38px; overflow: hidden;
    border: 9px solid rgba(34,32,28,0.92);
    background: #000;
  }
  .traevy-frame.float {
    box-shadow: 0 40px 90px -30px rgba(0,0,0,0.30), 0 12px 30px -12px rgba(0,0,0,0.16);
  }
  @media (prefers-color-scheme: dark) {
    body { background: oklch(0.16 0.006 250); color: oklch(0.96 0.005 250); }
  }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.35 } }

  /* responsive */
  @media (max-width: 980px) {
    .hero-grid { grid-template-columns: minmax(0, 1fr) !important; gap: 48px !important; }
    .hero-art { order: 2; }
    .insight-grid, .stats-grid { grid-template-columns: minmax(0, 1fr) !important; gap: 40px !important; }
    .stats-phone { order: 2; }
    .footer-grid { grid-template-columns: 1.4fr 1fr 1fr !important; }
    .nav-links { display: none !important; }
    /* let collapsed columns shrink below their children's intrinsic width */
    .hero-copy, .hero-art, .stats-phone { min-width: 0; }
  }
  @media (max-width: 720px) {
    .how-grid { grid-template-columns: minmax(0, 1fr) !important; gap: 48px !important; }
    .why-grid { grid-template-columns: minmax(0, 1fr) !important; gap: 16px !important; }
    .footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
    .nav-cta { display: none; }
  }
  /* phones */
  @media (max-width: 600px) {
    html { scroll-padding-top: 70px; }
    header > div { padding-left: 20px !important; padding-right: 20px !important; height: 62px !important; }
    main > section { padding-top: 52px !important; padding-bottom: 52px !important; }
    main > section > div { padding-top: 0 !important; padding-bottom: 0 !important;
      padding-left: 20px !important; padding-right: 20px !important; }
    footer > div { padding-left: 20px !important; padding-right: 20px !important;
      padding-top: 48px !important; padding-bottom: 32px !important; }
    /* hero: single phone, no overlap */
    .hero-phone-back { display: none !important; }
    .hero-halo { width: 290px !important; height: 290px !important; }
    .hero-grid { gap: 36px !important; }
    .hero-features { gap: 14px 20px !important; }
    /* CTAs stack full-width and stay tappable */
    .get-actions-row { flex-direction: column !important; align-items: stretch !important; }
    .get-actions-row .ga-btn, .get-actions-row > button { width: 100% !important; }
    .get-actions-row .ga-btn > button { width: 100% !important; }
    .footer-grid { grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 420px) {
    .footer-grid { grid-template-columns: 1fr !important; }
  }

  /* ultrawide scaling */
  @media (min-width: 1440px) {
    body { zoom: 1.10; }
  }
  @media (min-width: 1680px) {
    body { zoom: 1.30; }
  }
  @media (min-width: 1920px) {
    body { zoom: 1.45; }
  }
  @media (min-width: 2560px) {
    body { zoom: 1.75; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
